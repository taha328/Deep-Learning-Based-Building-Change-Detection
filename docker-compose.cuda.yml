services:
  backend-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: cuda
    image: building-change-backend:cuda
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-auto}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: cuda
    image: building-change-backend:cuda
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-auto}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
