services:
  postgres:
    image: ${POSTGIS_IMAGE:-imresamu/postgis:16-3.4}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-building_change}
      POSTGRES_USER: ${POSTGRES_USER:-building_change}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_shared_deployment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-building_change} -d ${POSTGRES_DB:-building_change}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend-api:
    image: ${BACKEND_IMAGE:-building-change-backend:cpu}
    restart: unless-stopped
    environment: &backend_environment
      PYTHONNOUSERSITE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app/backend
      MODEL_DEVICE: ${MODEL_DEVICE:-auto}
      APP_INFERENCE_BACKEND: ${APP_INFERENCE_BACKEND:-bandon_mps}
      PERSISTENCE_BACKEND: ${PERSISTENCE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-building_change}:${POSTGRES_PASSWORD:-change_me_before_shared_deployment}@postgres:5432/${POSTGRES_DB:-building_change}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_BANDON_ENV_PREFIX: ${APP_BANDON_ENV_PREFIX:-/app/backend/.venv}
      APP_BANDON_REPO_DIR: ${APP_BANDON_REPO_DIR:-/app/vendor/BANDON-mps}
      APP_BANDON_CONFIG_PATH: ${APP_BANDON_CONFIG_PATH:-/app/vendor/BANDON-mps/workdirs_bandon/MTGCDNet/config.py}
      APP_BANDON_CHECKPOINT_PATH: ${APP_BANDON_CHECKPOINT_PATH:-/models/bandon/mtgcdnet_iter_40000.pth}
      APP_RUNTIME_CACHE_DIR: ${APP_RUNTIME_CACHE_DIR:-/data/runtime_cache}
      APP_PACKAGED_DEPLOYMENT: "true"
      APP_MAPBOX_MAX_TILES_PER_REQUEST: ${APP_MAPBOX_MAX_TILES_PER_REQUEST:-1024}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      MAPBOX_CURRENT_IMAGERY_MAX_TILES: ${MAPBOX_CURRENT_IMAGERY_MAX_TILES:-1024}
      APP_WAYBACK_DEFAULT_ZOOM: ${APP_WAYBACK_DEFAULT_ZOOM:-18}
      APP_TILE_ZOOM: ${APP_TILE_ZOOM:-18}
      APP_WAYBACK_HTTP_CONNECT_TIMEOUT_SECONDS: ${APP_WAYBACK_HTTP_CONNECT_TIMEOUT_SECONDS:-60}
      APP_WAYBACK_HTTP_READ_TIMEOUT_SECONDS: ${APP_WAYBACK_HTTP_READ_TIMEOUT_SECONDS:-120}
      APP_WAYBACK_HTTP_MAX_RETRIES: ${APP_WAYBACK_HTTP_MAX_RETRIES:-8}
      APP_WAYBACK_HTTP_BACKOFF_BASE_SECONDS: ${APP_WAYBACK_HTTP_BACKOFF_BASE_SECONDS:-1.0}
      APP_WAYBACK_TILE_MAX_CONCURRENCY: ${APP_WAYBACK_TILE_MAX_CONCURRENCY:-12}
      APP_WAYBACK_MAX_MISSING_TILE_RATIO: ${APP_WAYBACK_MAX_MISSING_TILE_RATIO:-0.05}
      APP_CHANGE_THRESHOLD: ${APP_CHANGE_THRESHOLD:-0.50}
      APP_SEMANTIC_THRESHOLD: ${APP_SEMANTIC_THRESHOLD:-0.50}
      APP_POST_COMPLETION_REQUEST_CLEANUP_ENABLED: ${APP_POST_COMPLETION_REQUEST_CLEANUP_ENABLED:-true}
      APP_POST_COMPLETION_REQUEST_CLEANUP_MODE: ${APP_POST_COMPLETION_REQUEST_CLEANUP_MODE:-compact_heavy}
      APP_POST_COMPLETION_REQUEST_CLEANUP_GRACE_SECONDS: ${APP_POST_COMPLETION_REQUEST_CLEANUP_GRACE_SECONDS:-300}
      APP_POST_COMPLETION_REQUEST_CLEANUP_KEEP_PROVENANCE: ${APP_POST_COMPLETION_REQUEST_CLEANUP_KEEP_PROVENANCE:-true}
      APP_POST_COMPLETION_REQUEST_CLEANUP_DELETE_EXPORT_BUNDLE: ${APP_POST_COMPLETION_REQUEST_CLEANUP_DELETE_EXPORT_BUNDLE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:${FRONTEND_PORT:-8080},http://localhost:${FRONTEND_PORT:-8080}}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - runtime_cache:/data/runtime_cache
      - ./models/bandon:/models/bandon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /app/backend/.venv/bin/python
      - /app/backend/scripts/start_backend.py
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-reload
    healthcheck:
      test:
        - CMD
        - /app/backend/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 10

  celery-worker:
    image: ${BACKEND_IMAGE:-building-change-backend:cpu}
    restart: unless-stopped
    environment: *backend_environment
    volumes:
      - runtime_cache:/data/runtime_cache
      - ./models/bandon:/models/bandon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /app/backend/.venv/bin/python
      - /app/backend/scripts/start_celery_worker.py

  frontend:
    image: ${FRONTEND_IMAGE:-building-change-frontend:latest}
    restart: unless-stopped
    environment:
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  runtime_cache:
