services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: building_change
      POSTGRES_USER: building_change
      POSTGRES_PASSWORD: building_change
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U building_change -d building_change"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

