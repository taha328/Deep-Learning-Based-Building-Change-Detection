services:
  postgres:
    image: ${POSTGIS_IMAGE:-imresamu/postgis:16-3.4}
    environment:
      POSTGRES_DB: building_change
      POSTGRES_USER: building_change
      POSTGRES_PASSWORD: building_change
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U building_change -d building_change"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: cpu
    image: building-change-backend:cpu
    environment: &backend_environment
      PYTHONNOUSERSITE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app/backend
      MODEL_DEVICE: ${MODEL_DEVICE:-auto}
      APP_INFERENCE_BACKEND: ${APP_INFERENCE_BACKEND:-bandon_mps}
      PERSISTENCE_BACKEND: ${PERSISTENCE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://building_change:building_change@postgres:5432/building_change}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_BANDON_ENV_PREFIX: ${APP_BANDON_ENV_PREFIX:-/app/backend/.venv}
      APP_BANDON_REPO_DIR: ${APP_BANDON_REPO_DIR:-/app/vendor/BANDON-mps}
      APP_BANDON_CONFIG_PATH: ${APP_BANDON_CONFIG_PATH:-/app/vendor/BANDON-mps/workdirs_bandon/MTGCDNet/config.py}
      APP_BANDON_CHECKPOINT_PATH: ${APP_BANDON_CHECKPOINT_PATH:-/models/bandon/mtgcdnet_iter_40000.pth}
      APP_RUNTIME_CACHE_DIR: ${APP_RUNTIME_CACHE_DIR:-/data/runtime_cache}
    ports:
      - "8000:8000"
    volumes:
      - runtime_cache:/data/runtime_cache
      - ./vendor/BANDON-mps/checkpoints:/models/bandon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /app/backend/.venv/bin/python
      - /app/backend/scripts/start_backend.py
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-reload
    healthcheck:
      test:
        - CMD
        - /app/backend/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 5

  celery-worker:
    image: building-change-backend:cpu
    environment: *backend_environment
    volumes:
      - runtime_cache:/data/runtime_cache
      - ./vendor/BANDON-mps/checkpoints:/models/bandon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /app/backend/.venv/bin/python
      - /app/backend/scripts/start_celery_worker.py

volumes:
  postgres_data:
  redis_data:
  runtime_cache:
